<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskBoard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;min-height:100vh}

header{background:#1a1a2e;color:#fff;padding:16px 28px;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:18px;font-weight:700}
header .stats{font-size:13px;color:#a0a0b8}

.board{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;padding:28px;max-width:1200px;margin:0 auto}

.column{background:#e5e7eb;border-radius:10px;padding:16px;min-height:400px}
.column h2{font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:#6b7280;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.column h2 .count{background:#d1d5db;color:#374151;font-size:11px;padding:2px 8px;border-radius:10px}

.card{background:#fff;border-radius:8px;padding:14px;margin-bottom:10px;box-shadow:0 1px 2px rgba(0,0,0,.06);cursor:default}
.card .title{font-size:14px;font-weight:600;color:#111827;margin-bottom:6px}
.card .assignee{font-size:12px;color:#6b7280}
</style>
</head>
<body>

<header>
  <h1>TaskBoard</h1>
  <div class="stats" id="stats"></div>
</header>

<div class="board" id="board"></div>

<script>
const COL_META = {
  backlog:     {label:'Backlog'},
  in_progress: {label:'In Progress'},
  done:        {label:'Done'},
};

(async()=>{
  const board = await fetch('/api/board').then(r=>r.json());
  const el = document.getElementById('board');

  let total = 0;
  for(const col of Object.keys(COL_META)){
    const tasks = board[col]||[];
    total += tasks.length;
    const div = document.createElement('div');
    div.className = 'column';
    div.innerHTML = `
      <h2>${COL_META[col].label} <span class="count">${tasks.length}</span></h2>
      ${tasks.map(t=>`
        <div class="card" data-priority="${t.priority}">
          <div class="title">${t.title}</div>
          <div class="assignee">${t.assignee}</div>
        </div>
      `).join('')}
    `;
    el.appendChild(div);
  }
  document.getElementById('stats').textContent = total+' tasks';
})();
</script>
</body>
</html>
